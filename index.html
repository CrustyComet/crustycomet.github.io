<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vdeio Chat</title>
  <style>
    * { box-sizing: border-box; }

    :root{
      --yellow:#fffc00;
      --black:#111111;
      --white:#ffffff;
      --gray:#f3f4f6;
      --line:#d1d5db;
      --blue:#60a5fa;
      --purple:#a855f7;
      --green:#22c55e;
      --red:#ef4444;
    }

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:var(--yellow);
      color:var(--black);
    }

    .hidden{ display:none !important; }

    .app{
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    .topbar{
      background:var(--black);
      color:var(--white);
      padding:14px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      position:sticky;
      top:0;
      z-index:20;
    }

    .brand{
      font-size:24px;
      font-weight:800;
    }

    .top-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    button{
      border:none;
      border-radius:12px;
      padding:10px 14px;
      font-weight:700;
      cursor:pointer;
    }

    .btn-dark{ background:var(--black); color:var(--white); }
    .btn-light{ background:var(--white); color:var(--black); }
    .btn-blue{ background:var(--blue); color:var(--black); }
    .btn-purple{ background:var(--purple); color:var(--white); }
    .btn-green{ background:var(--green); color:var(--white); }
    .btn-red{ background:var(--red); color:var(--white); }

    .screen{
      padding:16px;
      max-width:1200px;
      width:100%;
      margin:0 auto;
    }

    .auth-wrap{
      max-width:420px;
      margin:40px auto;
      background:var(--white);
      border:3px solid var(--black);
      border-radius:24px;
      padding:20px;
      box-shadow:0 10px 0 var(--black);
    }

    .auth-wrap h1{
      margin-top:0;
      font-size:32px;
    }

    .field{
      margin-bottom:12px;
    }

    .field label{
      display:block;
      font-weight:700;
      margin-bottom:6px;
    }

    .field input, .field textarea{
      width:100%;
      padding:12px;
      border:2px solid var(--black);
      border-radius:12px;
      font-size:16px;
    }

    .auth-switch{
      margin-top:12px;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      text-decoration:underline;
    }

    .main-grid{
      display:grid;
      grid-template-columns:280px 1fr 280px;
      gap:16px;
      padding:16px;
      max-width:1400px;
      width:100%;
      margin:0 auto;
    }

    .panel{
      background:var(--white);
      border:3px solid var(--black);
      border-radius:22px;
      padding:14px;
      min-height:200px;
    }

    .panel h3{
      margin-top:0;
      margin-bottom:12px;
      font-size:22px;
    }

    .profile-card{
      text-align:center;
    }

    .avatar{
      width:80px;
      height:80px;
      border-radius:50%;
      background:var(--black);
      color:var(--yellow);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:30px;
      font-weight:800;
      margin:0 auto 10px;
    }

    .tag{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      margin:4px 4px 0 0;
      background:var(--gray);
      border:2px solid var(--black);
    }

    .tag.vip{ background:var(--yellow); }
    .tag.nitro{ background:var(--purple); color:white; }

    .list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .friend-item, .chat-item, .shop-item{
      border:2px solid var(--black);
      border-radius:16px;
      padding:10px;
      background:var(--gray);
    }

    .friend-item{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
    }

    .chat-item{
      cursor:pointer;
      background:white;
    }

    .chat-item.active{
      background:var(--yellow);
    }

    .chat-name{
      font-weight:800;
    }

    .chat-preview{
      font-size:13px;
      color:#444;
      margin-top:4px;
    }

    .chat-area{
      display:flex;
      flex-direction:column;
      height:70vh;
    }

    .chat-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      border-bottom:2px solid var(--line);
      padding-bottom:10px;
      margin-bottom:10px;
    }

    .messages{
      flex:1;
      overflow:auto;
      display:flex;
      flex-direction:column;
      gap:10px;
      padding-right:4px;
    }

    .message{
      max-width:75%;
      padding:10px 12px;
      border-radius:16px;
      border:2px solid var(--black);
      word-wrap:break-word;
    }

    .message.me{
      align-self:flex-end;
      background:var(--yellow);
    }

    .message.them{
      align-self:flex-start;
      background:var(--gray);
    }

    .message-meta{
      font-size:11px;
      opacity:0.7;
      margin-top:4px;
    }

    .composer{
      display:flex;
      gap:8px;
      margin-top:12px;
    }

    .composer input{
      flex:1;
      padding:12px;
      border:2px solid var(--black);
      border-radius:14px;
      font-size:16px;
    }

    .notice{
      margin:12px 0;
      background:white;
      border:2px solid var(--black);
      border-radius:14px;
      padding:10px 12px;
      font-weight:700;
    }

    .small{
      font-size:13px;
      color:#333;
    }

    @media (max-width: 1000px){
      .main-grid{
        grid-template-columns:1fr;
      }
      .chat-area{
        height:55vh;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">👻 Vdeio Chat</div>
      <div class="top-actions">
        <button class="btn-light" onclick="showScreen('authScreen')">Auth</button>
        <button class="btn-light hidden" id="logoutBtn" onclick="logout()">Log Out</button>
      </div>
    </div>

    <div id="authScreen" class="screen">
      <div class="auth-wrap">
        <h1 id="authTitle">Sign Up</h1>

        <div class="notice" id="authNotice">Create an account to start chatting.</div>

        <div id="signupFields">
          <div class="field">
            <label>Display Name</label>
            <input id="signupName" placeholder="Your username">
          </div>
        </div>

        <div class="field">
          <label>Email</label>
          <input id="authEmail" type="email" placeholder="you@example.com">
        </div>

        <div class="field">
          <label>Password</label>
          <input id="authPassword" type="password" placeholder="Password">
        </div>

        <button class="btn-dark" style="width:100%;" id="authMainBtn" onclick="submitAuth()">Create Account</button>
        <div class="auth-switch" id="authSwitch" onclick="toggleAuthMode()">Already have an account? Log in</div>
      </div>
    </div>

    <div id="appScreen" class="hidden">
      <div class="main-grid">
        <div class="panel">
          <div class="profile-card">
            <div class="avatar" id="profileAvatar">U</div>
            <h3 id="profileName">User</h3>
            <div id="profileTags"></div>
          </div>

          <div class="notice" id="welcomeBox">Welcome!</div>

          <h3>Add Friend</h3>
          <div class="field">
            <input id="friendNameInput" placeholder="Friend name">
          </div>
          <button class="btn-green" style="width:100%;" onclick="addFriend()">Add Friend</button>

          <h3 style="margin-top:16px;">Friends</h3>
          <div id="friendsList" class="list"></div>
        </div>

        <div class="panel">
          <div class="chat-area">
            <div class="chat-header">
              <div>
                <div class="chat-name" id="activeChatName">No chat selected</div>
                <div class="small" id="activeChatInfo">Pick a friend to start chatting</div>
              </div>
              <button class="btn-blue" onclick="sendFakeReply()" id="fakeReplyBtn">Fake Reply</button>
            </div>

            <div id="messagesBox" class="messages">
              <div class="notice">No messages yet.</div>
            </div>

            <div class="composer">
              <input id="messageInput" placeholder="Type a message...">
              <button class="btn-dark" onclick="sendMessage()">Send</button>
            </div>
          </div>
        </div>

        <div class="panel">
          <h3>Shop</h3>
          <div class="shop-item">
            <div class="chat-name">VIP</div>
            <div class="small">Special badge + cool status</div>
            <div style="margin-top:8px;">
              <button class="btn-green" onclick="buyVIP()">Buy VIP</button>
            </div>
          </div>

          <div class="shop-item" style="margin-top:10px;">
            <div class="chat-name">Nitro</div>
            <div class="small">Purple badge + premium flex vibes</div>
            <div style="margin-top:8px;">
              <button class="btn-purple" onclick="buyNitro()">Buy Nitro</button>
            </div>
          </div>

          <h3 style="margin-top:16px;">Chats</h3>
          <div id="chatList" class="list"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let authMode = "signup";
    let currentUserEmail = null;
    let activeChat = null;

    function getUsers() {
      return JSON.parse(localStorage.getItem("vdeio_users") || "{}");
    }

    function saveUsers(users) {
      localStorage.setItem("vdeio_users", JSON.stringify(users));
    }

    function getSession() {
      return localStorage.getItem("vdeio_session");
    }

    function saveSession(email) {
      localStorage.setItem("vdeio_session", email);
    }

    function clearSession() {
      localStorage.removeItem("vdeio_session");
    }

    function getCurrentUser() {
      const users = getUsers();
      if (!currentUserEmail || !users[currentUserEmail]) return null;
      return users[currentUserEmail];
    }

    function updateCurrentUser(user) {
      const users = getUsers();
      users[currentUserEmail] = user;
      saveUsers(users);
    }

    function showScreen(id) {
      document.getElementById("authScreen").classList.add("hidden");
      document.getElementById("appScreen").classList.add("hidden");
      document.getElementById(id).classList.remove("hidden");
      document.getElementById("logoutBtn").classList.toggle("hidden", id !== "appScreen");
    }

    function toggleAuthMode() {
      authMode = authMode === "signup" ? "login" : "signup";
      const title = document.getElementById("authTitle");
      const mainBtn = document.getElementById("authMainBtn");
      const switchBtn = document.getElementById("authSwitch");
      const signupFields = document.getElementById("signupFields");
      const notice = document.getElementById("authNotice");

      if (authMode === "signup") {
        title.textContent = "Sign Up";
        mainBtn.textContent = "Create Account";
        switchBtn.textContent = "Already have an account? Log in";
        signupFields.classList.remove("hidden");
        notice.textContent = "Create an account to start chatting.";
      } else {
        title.textContent = "Log In";
        mainBtn.textContent = "Log In";
        switchBtn.textContent = "Need an account? Sign up";
        signupFields.classList.add("hidden");
        notice.textContent = "Log in to keep chatting.";
      }
    }

    function submitAuth() {
      const users = getUsers();
      const email = document.getElementById("authEmail").value.trim().toLowerCase();
      const password = document.getElementById("authPassword").value.trim();
      const name = document.getElementById("signupName").value.trim();

      if (!email || !password) {
        alert("Fill in email and password.");
        return;
      }

      if (authMode === "signup") {
        if (!name) {
          alert("Enter a display name.");
          return;
        }
        if (users[email]) {
          alert("That account already exists.");
          return;
        }

        users[email] = {
          name,
          email,
          password,
          vip: false,
          nitro: false,
          friends: [],
          chats: {}
        };

        saveUsers(users);
        currentUserEmail = email;
        saveSession(email);
        loadApp();
      } else {
        if (!users[email] || users[email].password !== password) {
          alert("Wrong email or password.");
          return;
        }

        currentUserEmail = email;
        saveSession(email);
        loadApp();
      }
    }

    function logout() {
      clearSession();
      currentUserEmail = null;
      activeChat = null;
      showScreen("authScreen");
    }

    function addFriend() {
      const user = getCurrentUser();
      const name = document.getElementById("friendNameInput").value.trim();
      if (!name) {
        alert("Enter a friend name.");
        return;
      }

      if (user.friends.includes(name)) {
        alert("That friend is already added.");
        return;
      }

      user.friends.push(name);
      user.chats[name] = user.chats[name] || [];
      updateCurrentUser(user);
      document.getElementById("friendNameInput").value = "";
      renderFriends();
      renderChats();
    }

    function openChat(friendName) {
      activeChat = friendName;
      renderChats();
      renderMessages();
    }

    function sendMessage() {
      const user = getCurrentUser();
      if (!activeChat) {
        alert("Pick a friend first.");
        return;
      }

      const input = document.getElementById("messageInput");
      const text = input.value.trim();
      if (!text) return;

      user.chats[activeChat] = user.chats[activeChat] || [];
      user.chats[activeChat].push({
        from: "me",
        text,
        time: new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
      });

      updateCurrentUser(user);
      input.value = "";
      renderMessages();
      renderChats();
    }

    function sendFakeReply() {
      const user = getCurrentUser();
      if (!activeChat) {
        alert("Pick a friend first.");
        return;
      }

      const replies = [
        "hey lol",
        "that’s cool",
        "wanna call later?",
        "i saw your message",
        "omg really",
        "okayyy",
        "send a snap 😭"
      ];

      const text = replies[Math.floor(Math.random() * replies.length)];

      user.chats[activeChat] = user.chats[activeChat] || [];
      user.chats[activeChat].push({
        from: "them",
        text,
        time: new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
      });

      updateCurrentUser(user);
      renderMessages();
      renderChats();
    }

    function renderFriends() {
      const user = getCurrentUser();
      const box = document.getElementById("friendsList");
      box.innerHTML = "";

      if (!user.friends.length) {
        box.innerHTML = '<div class="notice">No friends yet.</div>';
        return;
      }

      user.friends.forEach(friend => {
        const div = document.createElement("div");
        div.className = "friend-item";
        div.innerHTML = `
          <div><b>${friend}</b></div>
          <button class="btn-dark" onclick="openChat('${escapeQuotes(friend)}')">Chat</button>
        `;
        box.appendChild(div);
      });
    }

    function renderChats() {
      const user = getCurrentUser();
      const box = document.getElementById("chatList");
      box.innerHTML = "";

      if (!user.friends.length) {
        box.innerHTML = '<div class="notice">No chats yet.</div>';
        return;
      }

      user.friends.forEach(friend => {
        const msgs = user.chats[friend] || [];
        const last = msgs.length ? msgs[msgs.length - 1].text : "No messages yet";
        const div = document.createElement("div");
        div.className = "chat-item" + (activeChat === friend ? " active" : "");
        div.onclick = () => openChat(friend);
        div.innerHTML = `
          <div class="chat-name">${friend}</div>
          <div class="chat-preview">${last}</div>
        `;
        box.appendChild(div);
      });
    }

    function renderMessages() {
      const user = getCurrentUser();
      const nameEl = document.getElementById("activeChatName");
      const infoEl = document.getElementById("activeChatInfo");
      const box = document.getElementById("messagesBox");

      if (!activeChat) {
        nameEl.textContent = "No chat selected";
        infoEl.textContent = "Pick a friend to start chatting";
        box.innerHTML = '<div class="notice">No messages yet.</div>';
        return;
      }

      nameEl.textContent = activeChat;
      infoEl.textContent = "Chatting now";

      const msgs = user.chats[activeChat] || [];
      box.innerHTML = "";

      if (!msgs.length) {
        box.innerHTML = '<div class="notice">Say hi first.</div>';
        return;
      }

      msgs.forEach(msg => {
        const div = document.createElement("div");
        div.className = "message " + (msg.from === "me" ? "me" : "them");
        div.innerHTML = `
          <div>${msg.text}</div>
          <div class="message-meta">${msg.time}</div>
        `;
        box.appendChild(div);
      });

      box.scrollTop = box.scrollHeight;
    }

    function buyVIP() {
      const user = getCurrentUser();
      if (user.vip) {
        alert("You already have VIP.");
        return;
      }
      user.vip = true;
      updateCurrentUser(user);
      renderProfile();
      alert("VIP unlocked!");
    }

    function buyNitro() {
      const user = getCurrentUser();
      if (user.nitro) {
        alert("You already have Nitro.");
        return;
      }
      user.nitro = true;
      updateCurrentUser(user);
      renderProfile();
      alert("Nitro unlocked!");
    }

    function renderProfile() {
      const user = getCurrentUser();
      document.getElementById("profileAvatar").textContent = user.name.charAt(0).toUpperCase();
      document.getElementById("profileName").textContent = user.name;
      document.getElementById("welcomeBox").textContent = "Logged in as " + user.email;

      const tags = document.getElementById("profileTags");
      tags.innerHTML = '<span class="tag">Member</span>';
      if (user.vip) tags.innerHTML += '<span class="tag vip">VIP</span>';
      if (user.nitro) tags.innerHTML += '<span class="tag nitro">Nitro</span>';
    }

    function loadApp() {
      showScreen("appScreen");
      renderProfile();
      renderFriends();
      renderChats();
      renderMessages();
    }

    function escapeQuotes(text) {
      return text.replace(/'/g, "\\'");
    }

    function boot() {
      const session = getSession();
      const users = getUsers();

      if (session && users[session]) {
        currentUserEmail = session;
        loadApp();
      } else {
        showScreen("authScreen");
      }
    }

    boot();
  </script>
</body>
</html>
